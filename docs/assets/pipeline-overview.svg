<svg xmlns="http://www.w3.org/2000/svg" width="1440" height="360" viewBox="0 0 1440 360" role="img" aria-labelledby="title desc">
  <title id="title">Bike-sharing data pipeline</title>
  <desc id="desc">Four stages: acquire public trip data, prepare clean event streams, analyze origin-destination networks, and create point-process inputs.</desc>
  <defs>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="6" stdDeviation="7" flood-color="#0f172a" flood-opacity="0.10"/>
    </filter>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="9" refY="5" orient="auto">
      <path d="M0,0 L10,5 L0,10 Z" fill="#64748b"/>
    </marker>
  </defs>

  <rect width="1440" height="360" rx="28" fill="#f8fafc"/>
  <text x="720" y="57" text-anchor="middle" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="32" font-weight="700" fill="#0f172a">Bike-sharing data pipeline</text>

  <g stroke="#64748b" stroke-width="5" fill="none" marker-end="url(#arrow)">
    <path d="M338 190 H396"/>
    <path d="M678 190 H736"/>
    <path d="M1018 190 H1076"/>
  </g>

  <g filter="url(#shadow)" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif">
    <g transform="translate(58 105)">
      <rect width="280" height="170" rx="22" fill="#eff6ff" stroke="#3b82f6" stroke-width="3"/>
      <circle cx="42" cy="42" r="24" fill="#2563eb"/>
      <text x="42" y="50" text-anchor="middle" font-size="22" font-weight="700" fill="#ffffff">1</text>
      <text x="82" y="50" font-size="28" font-weight="700" fill="#0f172a">Acquire</text>
      <text x="24" y="101" font-size="20" fill="#334155">Public trip files</text>
      <text x="24" y="132" font-size="18" fill="#64748b">City and year manifests</text>
    </g>

    <g transform="translate(398 105)">
      <rect width="280" height="170" rx="22" fill="#f5f3ff" stroke="#8b5cf6" stroke-width="3"/>
      <circle cx="42" cy="42" r="24" fill="#7c3aed"/>
      <text x="42" y="50" text-anchor="middle" font-size="22" font-weight="700" fill="#ffffff">2</text>
      <text x="82" y="50" font-size="28" font-weight="700" fill="#0f172a">Prepare</text>
      <text x="24" y="101" font-size="20" fill="#334155">Schema standardization</text>
      <text x="24" y="132" font-size="18" fill="#64748b">Clean event streams</text>
    </g>

    <g transform="translate(738 105)">
      <rect width="280" height="170" rx="22" fill="#ecfdf5" stroke="#10b981" stroke-width="3"/>
      <circle cx="42" cy="42" r="24" fill="#059669"/>
      <text x="42" y="50" text-anchor="middle" font-size="22" font-weight="700" fill="#ffffff">3</text>
      <text x="82" y="50" font-size="28" font-weight="700" fill="#0f172a">Analyze</text>
      <text x="24" y="101" font-size="20" fill="#334155">OD flows and networks</text>
      <text x="24" y="132" font-size="18" fill="#64748b">Communities and summaries</text>
    </g>

    <g transform="translate(1078 105)">
      <rect width="304" height="170" rx="22" fill="#fff7ed" stroke="#f97316" stroke-width="3"/>
      <circle cx="42" cy="42" r="24" fill="#ea580c"/>
      <text x="42" y="50" text-anchor="middle" font-size="22" font-weight="700" fill="#ffffff">4</text>
      <text x="82" y="50" font-size="28" font-weight="700" fill="#0f172a">Model</text>
      <text x="24" y="101" font-size="20" fill="#334155">Point-process inputs</text>
      <text x="24" y="132" font-size="18" fill="#64748b">Diagnostics and pilot fit</text>
    </g>
  </g>

  <text x="720" y="326" text-anchor="middle" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="18" fill="#64748b">Heterogeneous city data → standardized events → network features → temporal modelling</text>
</svg>
